<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПУТЬ ЧЕМПИОНА: Даниил Тульский</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Montserrat:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #0f172a; 
            color: #f8fafc;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .judo-title { font-family: 'Exo 2', sans-serif; text-transform: uppercase; letter-spacing: -1px; }

        .belt-white { background: #fff; color: #1e293b; box-shadow: 0 0 20px #fff; }
        .belt-white-yellow { background: linear-gradient(90deg, #fff 50%, #fde047 50%); color: #1e293b; }
        .belt-yellow { background: #fde047; color: #854d0e; box-shadow: 0 0 20px #fde047; }
        .belt-yellow-orange { background: linear-gradient(90deg, #fde047 50%, #f97316 50%); color: #fff; }
        .belt-orange { background: #f97316; color: #fff; box-shadow: 0 0 20px #f97316; }
        .belt-orange-green { background: linear-gradient(90deg, #f97316 50%, #22c55e 50%); color: #fff; }
        .belt-green { background: #22c55e; color: #fff; box-shadow: 0 0 20px #22c55e; }

        .glass { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2.5rem;
        }

        .xp-bar { background: rgba(255,255,255,0.05); border-radius: 1rem; overflow: hidden; height: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .xp-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6); 
            background-size: 200% 100%;
            animation: moveGradient 3s linear infinite;
            transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }

        @keyframes moveGradient { 0% { background-position: 100% 0%; } 100% { background-position: -100% 0%; } }

        .btn-game { 
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            box-shadow: 0 6px 0 #1d4ed8, 0 12px 24px rgba(29, 78, 216, 0.4);
            transition: all 0.1s;
        }
        .btn-game:active { transform: translateY(4px); box-shadow: 0 0 0 #1d4ed8; }

        .tour-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .tour-card.gold-border { border-left: 6px solid #fbbf24; background: rgba(251, 191, 36, 0.05); }

        input, select, textarea { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 1rem !important; }
    </style>
</head>
<body class="pb-10">

    <div class="max-w-3xl mx-auto px-4 pt-6">
        
        <header class="glass p-8 mb-6 animate__animated animate__fadeInDown">
            <div class="flex items-center gap-6 mb-6">
                <div id="beltHero" class="w-24 h-24 rounded-[2.5rem] flex items-center justify-center text-4xl shadow-2xl transition-all duration-700">
                    🥋
                </div>
                <div class="flex-1">
                    <h1 class="judo-title text-3xl font-900 tracking-tighter italic">ДАНИИЛ ТУЛЬСКИЙ</h1>
                    <div class="flex items-center gap-3 mt-2">
                        <span id="rankBadge" class="bg-blue-600/20 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full border border-blue-500/30 uppercase tracking-widest">Белый пояс</span>
                        <select id="beltSelect" class="bg-transparent text-[10px] font-bold text-slate-500 uppercase outline-none cursor-pointer hover:text-white">
                            <option value="belt-white">Белый</option>
                            <option value="belt-white-yellow">Бело-желтый</option>
                            <option value="belt-yellow">Желтый</option>
                            <option value="belt-yellow-orange">Желто-оранжевый</option>
                            <option value="belt-orange">Оранжевый</option>
                            <option value="belt-orange-green">Оранжево-зеленый</option>
                            <option value="belt-green">Зеленый</option>
                        </select>
                    </div>
                </div>
                <div class="text-center bg-white/5 p-3 rounded-3xl border border-white/10">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1 italic">УРОВЕНЬ</p>
                    <div id="levelCircle" class="w-12 h-12 rounded-full border-2 border-blue-500 flex items-center justify-center font-900 text-blue-400 text-xl">1</div>
                </div>
            </div>

            <div class="relative">
                <div class="flex justify-between text-[11px] font-black uppercase tracking-widest mb-3 text-slate-400">
                    <span id="rankText" class="text-blue-400">Смелый Новичок</span>
                    <span id="xpText">0 / 100 XP</span>
                </div>
                <div class="xp-bar">
                    <div id="xpFill" class="xp-fill" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-6 flex flex-col items-center animate__animated animate__zoomIn" style="animation-delay: 0.1s">
                <div class="text-4xl mb-2">🥇</div>
                <span class="text-4xl font-900 judo-title text-amber-400" id="s-gold">0</span>
                <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest mt-1">Золото</span>
            </div>
            <div class="glass p-6 flex flex-col items-center animate__animated animate__zoomIn" style="animation-delay: 0.2s">
                <div class="text-4xl mb-2">🥈</div>
                <span class="text-4xl font-900 judo-title text-slate-300" id="s-silver">0</span>
                <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest mt-1">Серебро</span>
            </div>
            <div class="glass p-6 flex flex-col items-center animate__animated animate__zoomIn" style="animation-delay: 0.3s">
                <div class="text-4xl mb-2">🥉</div>
                <span class="text-4xl font-900 judo-title text-orange-400" id="s-bronze">0</span>
                <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest mt-1">Бронза</span>
            </div>
            <div class="glass p-6 flex flex-col items-center border-2 border-blue-500/20 animate__animated animate__zoomIn" style="animation-delay: 0.4s">
                <div class="text-4xl mb-2">🏆</div>
                <span class="text-4xl font-900 judo-title text-blue-400" id="s-total">0</span>
                <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest mt-1">Турниров</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass p-8">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-6">График активности</h3>
                <div class="h-40"><canvas id="chartYear"></canvas></div>
            </div>
            <div class="glass p-8 flex flex-col items-center justify-center relative">
                <div class="h-40 w-full flex items-center justify-center">
                    <canvas id="chartWin" class="max-w-[140px]"></canvas>
                    <div class="absolute flex flex-col items-center justify-center mt-4">
                        <span id="winRate" class="text-3xl font-900 judo-title italic">0%</span>
                        <span class="text-[8px] font-black text-slate-500 uppercase">Побед</span>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="openModal()" class="btn-game w-full p-6 rounded-[2rem] mb-12 flex items-center justify-center gap-4 animate__animated animate__pulse animate__infinite">
            <i class="fas fa-plus-circle text-2xl text-yellow-300"></i>
            <span class="font-900 judo-title tracking-widest text-lg">НОВЫЙ ТРОФЕЙ В КОПИЛКУ</span>
        </button>

        <div id="tourList" class="space-y-4 px-1"></div>
        <div id="noData" class="text-center p-20 opacity-10 hidden italic uppercase text-xs tracking-widest font-bold">
            <i class="fas fa-scroll text-6xl mb-4"></i><br>История начнется здесь
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass w-full max-w-md p-10 border-2 border-blue-500/50 animate__animated animate__zoomIn">
            <h3 class="text-2xl font-900 judo-title mb-8 italic text-center text-blue-400">НОВЫЙ РЕЗУЛЬТАТ</h3>
            <div class="space-y-5">
                <input id="f-name" type="text" placeholder="Название турнира" class="w-full p-5 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <div class="grid grid-cols-2 gap-4">
                    <input id="f-date" type="date" class="p-5 font-bold">
                    <select id="f-country" class="p-5 font-bold">
                        <option value="🇨🇿 Чехия">🇨🇿 Чехия</option><option value="🇩🇪 Германия">🇩🇪 Германия</option><option value="🇦🇹 Австрия">🇦🇹 Австрия</option><option value="🌍 Другая">🌍 Другая</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-age" class="p-5 font-bold"><option>U12</option><option>U14</option><option>U16</option></select>
                    <input id="f-weight" type="number" placeholder="кг" class="p-5 font-bold">
                </div>
                <select id="f-res" class="w-full p-5 font-900 text-center bg-blue-900/40 border-blue-500/30">
                    <option value="1">🥇 1 МЕСТО (ЗОЛОТО)</option>
                    <option value="2">🥈 2 МЕСТО (СЕРЕБРО)</option>
                    <option value="3">🥉 3 МЕСТО (БРОНЗА)</option>
                    <option value="0">🥋 УЧАСТНИК</option>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center"><p class="text-[8px] font-black text-slate-500 uppercase mb-2">ПОБЕДЫ</p><input id="f-win" type="number" value="0" class="w-full p-5 font-900 text-center text-blue-400"></div>
                    <div class="text-center"><p class="text-[8px] font-black text-slate-500 uppercase mb-2">ПОРАЖЕНИЯ</p><input id="f-loss" type="number" value="0" class="w-full p-5 font-900 text-center text-red-400"></div>
                </div>
            </div>
            <div class="flex gap-6 mt-10">
                <button onclick="closeModal()" class="flex-1 font-black text-slate-500 uppercase text-xs tracking-widest">Отмена</button>
                <button onclick="save()" class="flex-[3] btn-game text-white p-5 rounded-2xl font-900 judo-title">ВНЕСТИ!</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-4 left-4 flex gap-3 opacity-20 hover:opacity-100 transition-all">
        <button onclick="exportData()" class="text-[8px] font-black uppercase p-2 border border-white/20 rounded-xl">Backup</button>
        <label class="text-[8px] font-black uppercase p-2 border border-white/20 rounded-xl cursor-pointer">Load<input type="file" class="hidden" onchange="importData(event)"></label>
    </div>

    <script>
        function getDB() {
            let data = JSON.parse(localStorage.getItem('judo_champion_final_db')) || [];
            // Проверка всех старых ключей для надежности
            const oldKeys = ['judo_kids_v7', 'judo_final_v6', 'judo_master_db_color'];
            if(data.length === 0) {
                oldKeys.forEach(k => {
                    const old = localStorage.getItem(k);
                    if(old) { try { data = [...data, ...(Array.isArray(JSON.parse(old)) ? JSON.parse(old) : JSON.parse(old).db || [])]; } catch(e){} }
                });
                const unique = Array.from(new Map(data.map(i => [i.id || Date.now() + Math.random(), i])).values());
                localStorage.setItem('judo_champion_final_db', JSON.stringify(unique));
                return unique;
            }
            return data;
        }

        let db = getDB();
        let belt = localStorage.getItem('judo_belt_final_v7') || 'belt-white';
        let chartY, chartP, editId = null;

        function updateUI() {
            document.getElementById('noData').classList.toggle('hidden', db.length > 0);
            db.sort((a,b) => new Date(b.date) - new Date(a.date));

            const g = db.filter(i => i.res == '1').length;
            const wins = db.reduce((acc, i) => acc + parseInt(i.win || 0), 0);
            const loss = db.reduce((acc, i) => acc + parseInt(i.loss || 0), 0);

            document.getElementById('s-gold').innerText = g;
            document.getElementById('s-silver').innerText = db.filter(i => i.res == '2').length;
            document.getElementById('s-bronze').innerText = db.filter(i => i.res == '3').length;
            document.getElementById('s-total').innerText = db.length;

            const xp = (db.length * 10) + (wins * 5) + (g * 20);
            const level = Math.floor(xp / 100) + 1;
            const currentXP = xp % 100;
            document.getElementById('levelCircle').innerText = level;
            document.getElementById('xpFill').style.width = currentXP + '%';
            document.getElementById('xpText').innerText = `${currentXP} / 100 XP`;
            const ranks = ["Смелый Новичок", "Усердный Ученик", "Гроза Татами", "Мастер Броска", "Чемпион Клуба", "Легенда Дзюдо"];
            document.getElementById('rankText').innerText = ranks[Math.min(Math.floor(level / 2), ranks.length - 1)];

            const rate = (wins + loss) > 0 ? Math.round((wins / (wins + loss)) * 100) : 0;
            document.getElementById('winRate').innerText = rate + '%';
            document.getElementById('beltHero').className = `w-24 h-24 rounded-[2.5rem] flex items-center justify-center text-4xl shadow-2xl transition-all duration-700 ${belt}`;
            document.getElementById('rankBadge').innerText = document.querySelector(`#beltSelect option[value="${belt}"]`).text;

            // FIX ГРАФИКА: Ограничиваем ширину столбиков
            const yrs = {}; db.forEach(i => { const y = i.date.split('-')[0]; yrs[y] = (yrs[y] || 0) + 1; });
            const sY = Object.keys(yrs).sort();
            if(chartY) chartY.destroy();
            chartY = new Chart(document.getElementById('chartYear'), {
                type: 'bar',
                data: { labels: sY.length ? sY : ['2026'], datasets: [{ data: sY.map(y => yrs[y]), backgroundColor: '#3b82f6', borderRadius: 10, maxBarThickness: 50 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { stepSize: 1, color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { weight: 'bold' } } } } }
            });

            if(chartP) chartP.destroy();
            chartP = new Chart(document.getElementById('chartWin'), {
                type: 'doughnut',
                data: { datasets: [{ data: [wins, loss || 0.1], backgroundColor: ['#3b82f6', 'rgba(255,255,255,0.05)'], borderWidth: 0, cutout: '85%' }] },
                options: { events: [], plugins: { tooltip: { enabled: false } } }
            });

            document.getElementById('tourList').innerHTML = db.map(t => `
                <div class="glass p-6 flex justify-between items-center tour-card ${t.res == '1' ? 'gold-border animate__animated animate__pulse' : ''}">
                    <div class="flex items-center gap-5">
                        <div class="text-4xl transform hover:scale-125 transition-transform">${t.res == '1' ? '🥇' : t.res == '2' ? '🥈' : t.res == '3' ? '🥉' : '🥋'}</div>
                        <div>
                            <div class="font-900 judo-title italic text-sm text-white tracking-wide">${t.name}</div>
                            <div class="text-[9px] font-black text-slate-500 uppercase tracking-tighter mt-1">${t.date.split('-').reverse().join('.')} | ${t.country} | ${t.age} | ${t.weight}кг</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-center px-4 border-r border-white/5">
                            <p class="text-sm font-900 text-blue-400 leading-none">${t.win}</p>
                            <p class="text-[7px] font-black text-slate-600 uppercase mt-1">ПОБ.</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="edit(${t.id})" class="w-9 h-9 rounded-xl bg-blue-500/10 text-blue-400 flex items-center justify-center hover:bg-blue-500/20"><i class="fas fa-edit text-xs"></i></button>
                            <button onclick="del(${t.id})" class="w-9 h-9 rounded-xl bg-red-500/10 text-red-400 flex items-center justify-center hover:bg-red-500/20"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function save() {
            const r = document.getElementById('f-res').value;
            const item = {
                id: editId || Date.now(),
                name: document.getElementById('f-name').value || 'Турнир Шиаи',
                date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
                country: document.getElementById('f-country').value,
                age: document.getElementById('f-age').value,
                weight: document.getElementById('f-weight').value || '0',
                res: r,
                win: parseInt(document.getElementById('f-win').value) || 0,
                loss: parseInt(document.getElementById('f-loss').value) || 0
            };
            if(!editId && r == '1') confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#3b82f6', '#ffffff'] });
            if(editId) { const idx = db.findIndex(i => i.id === editId); db[idx] = item; }
            else { db.push(item); }
            localStorage.setItem('judo_champion_final_db', JSON.stringify(db));
            updateUI(); closeModal();
        }

        function edit(id) {
            editId = id; const t = db.find(i => i.id === id);
            document.getElementById('f-name').value = t.name; document.getElementById('f-date').value = t.date;
            document.getElementById('f-country').value = t.country; document.getElementById('f-age').value = t.age;
            document.getElementById('f-weight').value = t.weight; document.getElementById('f-res').value = t.res;
            document.getElementById('f-win').value = t.win; document.getElementById('f-loss').value = t.loss;
            document.getElementById('modal').classList.remove('hidden');
        }

        function del(id) { if(confirm('Удалить эту победу?')) { db = db.filter(i => i.id !== id); localStorage.setItem('judo_champion_final_db', JSON.stringify(db)); updateUI(); } }
        function openModal() { editId = null; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function exportData() {
            const b = new Blob([JSON.stringify({ db, belt })], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `даниил_дзюдо_про.json`; a.click();
        }
        function importData(e) {
            const r = new FileReader(); r.onload = (ev) => {
                const d = JSON.parse(ev.target.result); db = d.db; belt = d.belt;
                localStorage.setItem('judo_champion_final_db', JSON.stringify(db));
                localStorage.setItem('judo_belt_final_v7', belt);
                document.getElementById('beltSelect').value = belt; updateUI();
            }; r.readAsText(e.target.files[0]);
        }
        document.getElementById('beltSelect').addEventListener('change', (e) => {
            belt = e.target.value; localStorage.setItem('judo_belt_final_v7', belt); updateUI();
        });
        document.getElementById('beltSelect').value = belt;
        updateUI();
    </script>
</body>
</html>
