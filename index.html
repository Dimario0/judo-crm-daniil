<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Judo Super Champion - Даниил</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #f0f4f8;
            color: #1e293b;
            overflow-x: hidden;
        }

        /* Пояса IJF */
        .belt-white { background: #fff; border: 4px solid #e2e8f0; color: #64748b; }
        .belt-white-yellow { background: linear-gradient(90deg, #fff 50%, #fde047 50%); border: 4px solid #e2e8f0; }
        .belt-yellow { background: #fde047; border: 4px solid #facc15; }
        .belt-yellow-orange { background: linear-gradient(90deg, #fde047 50%, #f97316 50%); border: 4px solid #facc15; }
        .belt-orange { background: #f97316; border: 4px solid #ea580c; color: #fff; }
        .belt-orange-green { background: linear-gradient(90deg, #f97316 50%, #22c55e 50%); border: 4px solid #ea580c; }
        .belt-green { background: #22c55e; border: 4px solid #16a34a; color: #fff; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            border: 2px solid white;
        }

        .stat-value { transition: all 1s ease-out; }
        
        .progress-bar-fill {
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tour-card {
            transition: all 0.3s ease;
        }
        .tour-card:active { transform: scale(0.98); background: #f8fafc; }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        .btn-add { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body class="antialiased pb-20">

    <div class="max-w-4xl mx-auto px-4 pt-6">
        
        <header class="glass-card p-8 mb-8 animate__animated animate__fadeInDown">
            <div class="flex items-center gap-6 mb-6">
                <div id="beltBox" class="w-24 h-24 rounded-[2rem] shadow-xl flex items-center justify-center text-4xl transform hover:rotate-12 transition-transform duration-500">
                    <i class="fas fa-medal text-white/50"></i>
                </div>
                <div class="flex-1">
                    <h1 class="text-3xl font-900 tracking-tight italic text-slate-900 uppercase">Даниил Тульский</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">Будущий чемпион</span>
                        <select id="beltSelect" class="bg-transparent text-[10px] font-bold text-slate-400 uppercase outline-none cursor-pointer">
                            <option value="belt-white">Белый пояс</option>
                            <option value="belt-white-yellow">Бело-желтый</option>
                            <option value="belt-yellow">Желтый пояс</option>
                            <option value="belt-yellow-orange">Желто-оранжевый</option>
                            <option value="belt-orange">Оранжевый пояс</option>
                            <option value="belt-orange-green">Оранжево-зеленый</option>
                            <option value="belt-green">Зеленый пояс</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-black uppercase tracking-widest text-slate-400">
                    <span>Путь к Черному поясу</span>
                    <span id="progressPct">0%</span>
                </div>
                <div class="h-4 bg-slate-100 rounded-full overflow-hidden border border-slate-50 p-1">
                    <div id="progressBar" class="progress-bar-fill h-full bg-gradient-to-r from-blue-500 to-indigo-600 rounded-full shadow-lg" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 flex flex-col items-center animate__animated animate__zoomIn animate__delay-1s">
                <div class="text-4xl mb-1">🥇</div>
                <span class="text-4xl font-900 text-amber-500 stat-value" id="s-gold">0</span>
                <span class="text-[9px] font-black uppercase text-slate-400">Золото</span>
            </div>
            <div class="glass-card p-6 flex flex-col items-center animate__animated animate__zoomIn animate__delay-1s" style="animation-delay: 1.1s">
                <div class="text-4xl mb-1">🥈</div>
                <span class="text-4xl font-900 text-slate-400 stat-value" id="s-silver">0</span>
                <span class="text-[9px] font-black uppercase text-slate-400">Серебро</span>
            </div>
            <div class="glass-card p-6 flex flex-col items-center animate__animated animate__zoomIn animate__delay-1s" style="animation-delay: 1.2s">
                <div class="text-4xl mb-1">🥉</div>
                <span class="text-4xl font-900 text-orange-400 stat-value" id="s-bronze">0</span>
                <span class="text-[9px] font-black uppercase text-slate-400">Бронза</span>
            </div>
            <div class="glass-card p-6 flex flex-col items-center bg-slate-900 animate__animated animate__zoomIn animate__delay-1s" style="animation-delay: 1.3s">
                <div class="text-4xl mb-1">🌍</div>
                <span class="text-4xl font-900 text-white stat-value" id="s-total">0</span>
                <span class="text-[9px] font-black uppercase text-slate-500">Турниров</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass-card p-8">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest italic">Активность</h3>
                <canvas id="yChart" height="150"></canvas>
            </div>
            <div class="glass-card p-8 flex flex-col items-center justify-center relative">
                <canvas id="pChart" class="max-w-[150px]"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center mt-6">
                    <span id="rateVal" class="text-3xl font-900 italic">0%</span>
                    <span class="text-[8px] font-black text-slate-300 uppercase">Побед</span>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-end mb-6 px-4">
            <h2 class="text-2xl font-900 italic uppercase tracking-tighter text-slate-800">История побед</h2>
            <button onclick="openModal()" class="btn-add bg-blue-600 text-white px-8 py-4 rounded-2xl font-900 text-xs tracking-widest uppercase shadow-xl">
                Добавить медаль
            </button>
        </div>

        <div id="tourList" class="space-y-4">
            </div>

        <div id="noData" class="glass-card p-20 text-center text-slate-300 hidden">
            <i class="fas fa-award text-6xl mb-4 opacity-10"></i>
            <p class="font-bold uppercase text-xs tracking-widest">Твой путь начинается здесь!</p>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl animate__animated animate__backInUp">
            <h3 class="text-2xl font-900 mb-8 italic text-center">Новый результат</h3>
            <div class="grid grid-cols-1 gap-4">
                <input id="f-name" type="text" placeholder="Название турнира" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                <div class="grid grid-cols-2 gap-4">
                    <input id="f-date" type="date" class="bg-slate-50 rounded-2xl p-4 font-bold outline-none">
                    <select id="f-country" class="bg-slate-50 rounded-2xl p-4 font-bold outline-none">
                        <option value="🇨🇿 Чехия">🇨🇿 Чехия</option><option value="🇩🇪 Германия">🇩🇪 Германия</option><option value="🇦🇹 Австрия">🇦🇹 Австрия</option><option value="🌍 Другая">🌍 Другая</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-age" class="bg-slate-50 rounded-2xl p-4 font-bold outline-none"><option>U12</option><option>U14</option></select>
                    <input id="f-weight" type="number" placeholder="Вес (кг)" class="bg-slate-50 rounded-2xl p-4 font-bold outline-none">
                </div>
                <select id="f-res" class="bg-slate-100 rounded-2xl p-4 font-900 text-center outline-none">
                    <option value="1">🥇 1 МЕСТО (ЗОЛОТО)</option>
                    <option value="2">🥈 2 МЕСТО (СЕРЕБРО)</option>
                    <option value="3">🥉 3 МЕСТО (БРОНЗА)</option>
                    <option value="0">🥋 УЧАСТНИК</option>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center"><p class="text-[9px] font-black uppercase text-slate-400 mb-1">Побед</p><input id="f-win" type="number" value="0" class="w-full bg-slate-50 rounded-2xl p-4 font-black text-center text-blue-600"></div>
                    <div class="text-center"><p class="text-[9px] font-black uppercase text-slate-400 mb-1">Пор.</p><input id="f-loss" type="number" value="0" class="w-full bg-slate-50 rounded-2xl p-4 font-black text-center text-red-400"></div>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">Отмена</button>
                <button onclick="save()" class="flex-[2] bg-blue-600 text-white p-5 rounded-2xl font-900 shadow-xl shadow-blue-200">СОХРАНИТЬ!</button>
            </div>
        </div>
    </div>

    <script>
        // БАЗА ДАННЫХ И МИГРАЦИЯ
        function loadDB() {
            const keys = ['judo_final_v6', 'judo_master_db_color', 'judo_ultra_db'];
            let data = JSON.parse(localStorage.getItem('judo_kids_v7')) || [];
            if(data.length === 0) {
                keys.forEach(k => {
                    const old = localStorage.getItem(k);
                    if(old) { try { data = [...data, ...(Array.isArray(JSON.parse(old)) ? JSON.parse(old) : JSON.parse(old).db || [])]; } catch(e){} }
                });
                const unique = Array.from(new Map(data.map(i => [i.id, i])).values());
                localStorage.setItem('judo_kids_v7', JSON.stringify(unique));
                return unique;
            }
            return data;
        }

        let db = loadDB();
        let belt = localStorage.getItem('judo_belt_v7') || 'belt-white';
        let cY, cP, editId = null;

        function updateUI() {
            document.getElementById('noData').classList.toggle('hidden', db.length > 0);
            db.sort((a,b) => new Date(b.date) - new Date(a.date));

            // Статистика с анимацией чисел
            const g = db.filter(i => i.res == '1').length;
            const s = db.filter(i => i.res == '2').length;
            const b = db.filter(i => i.res == '3').length;
            const wins = db.reduce((acc, i) => acc + parseInt(i.win || 0), 0);
            const loss = db.reduce((acc, i) => acc + parseInt(i.loss || 0), 0);

            animateNumber('s-gold', g);
            animateNumber('s-silver', s);
            animateNumber('s-bronze', b);
            animateNumber('s-total', db.length);

            // Win Rate
            const rate = (wins + loss) > 0 ? Math.round((wins / (wins + loss)) * 100) : 0;
            document.getElementById('rateVal').innerText = rate + '%';

            // Прогресс бар (опыт)
            const exp = Math.min((db.length * 5) + (wins * 2) + (g * 10), 100);
            document.getElementById('progressBar').style.width = exp + '%';
            document.getElementById('progressPct').innerText = Math.round(exp) + '%';

            // Графики
            const years = {};
            db.forEach(i => { const y = i.date.split('-')[0]; years[y] = (years[y] || 0) + 1; });
            const sY = Object.keys(years).sort();
            if(cY) cY.destroy();
            cY = new Chart(document.getElementById('yChart'), {
                type: 'bar',
                data: { labels: sY.length ? sY : ['2025'], datasets: [{ data: sY.map(y => years[y]), backgroundColor: '#3b82f6', borderRadius: 10 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { stepSize: 1 } }, x: { grid: { display: false } } } }
            });

            if(cP) cP.destroy();
            cP = new Chart(document.getElementById('pChart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [wins, loss || 0.1], backgroundColor: ['#3b82f6', '#f1f5f9'], borderWidth: 0, cutout: '80%' }] },
                options: { events: [], plugins: { tooltip: { enabled: false } } }
            });

            // Пояс
            document.getElementById('beltBox').className = `w-24 h-24 rounded-[2rem] shadow-xl flex items-center justify-center text-4xl transform hover:rotate-12 transition-all duration-700 ${belt}`;

            // Карточки Турниров
            document.getElementById('tourList').innerHTML = db.map(t => `
                <div class="glass-card p-6 tour-card animate__animated animate__fadeInUp flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">${t.res == '1' ? '🥇' : t.res == '2' ? '🥈' : t.res == '3' ? '🥉' : '🥋'}</div>
                        <div>
                            <div class="font-900 text-slate-900 leading-tight uppercase italic text-sm">${t.name}</div>
                            <div class="text-[9px] font-black text-slate-400 mt-1 uppercase">${t.date.split('-').reverse().join('.')} | ${t.country}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-center px-4 border-l border-slate-100">
                            <p class="text-xs font-900 text-blue-600">${t.win}/${t.loss}</p>
                            <p class="text-[7px] font-black text-slate-300 uppercase">П/П</p>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button onclick="editItem(${t.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center"><i class="fas fa-pen text-[10px]"></i></button>
                            <button onclick="deleteItem(${t.id})" class="w-8 h-8 rounded-lg bg-red-50 text-red-300 flex items-center justify-center"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function save() {
            const res = document.getElementById('f-res').value;
            const item = {
                id: editId || Date.now(),
                name: document.getElementById('f-name').value || 'Новая победа',
                date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
                country: document.getElementById('f-country').value,
                age: document.getElementById('f-age').value,
                weight: document.getElementById('f-weight').value || '0',
                res: res,
                win: parseInt(document.getElementById('f-win').value) || 0,
                loss: parseInt(document.getElementById('f-loss').value) || 0
            };
            
            if(!editId && res == '1') launchConfetti(); // САЛЮТ ДЛЯ ЗОЛОТА!

            if(editId) { const idx = db.findIndex(i => i.id === editId); db[idx] = item; }
            else { db.push(item); }
            
            localStorage.setItem('judo_kids_v7', JSON.stringify(db));
            updateUI(); closeModal();
        }

        function launchConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#facc15', '#3b82f6'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#facc15', '#3b82f6'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function animateNumber(id, val) {
            const obj = document.getElementById(id);
            let start = 0;
            const dur = 1000;
            const step = (timestamp) => {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / dur, 1);
                obj.innerText = Math.floor(progress * val);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function editItem(id) {
            editId = id; const t = db.find(i => i.id === id);
            document.getElementById('f-name').value = t.name;
            document.getElementById('f-date').value = t.date;
            document.getElementById('f-country').value = t.country;
            document.getElementById('f-age').value = t.age;
            document.getElementById('f-weight').value = t.weight;
            document.getElementById('f-res').value = t.res;
            document.getElementById('f-win').value = t.win;
            document.getElementById('f-loss').value = t.loss;
            document.getElementById('modal').classList.remove('hidden');
        }

        function deleteItem(id) { if(confirm('Удалить эту медаль?')) { db = db.filter(i => i.id !== id); localStorage.setItem('judo_kids_v7', JSON.stringify(db)); updateUI(); } }
        function openModal() { editId = null; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function exportData() {
            const blob = new Blob([JSON.stringify({ db, belt })], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `путь_чемпиона_даниил.json`; a.click();
        }
        function importData(e) {
            const reader = new FileReader(); reader.onload = (ev) => {
                const d = JSON.parse(ev.target.result); db = d.db; belt = d.belt;
                localStorage.setItem('judo_kids_v7', JSON.stringify(db));
                localStorage.setItem('judo_belt_v7', belt);
                document.getElementById('beltSelect').value = belt; updateUI();
            }; reader.readAsText(e.target.files[0]);
        }
        document.getElementById('beltSelect').addEventListener('change', (e) => {
            belt = e.target.value; localStorage.setItem('judo_belt_v7', belt); updateUI();
        });
        document.getElementById('beltSelect').value = belt;
        updateUI();
    </script>
</body>
</html>
