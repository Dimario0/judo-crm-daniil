<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дневник Дзюдоиста - Даниил Тульский</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        /* Цвета поясов IJF */
        .belt-white { background: #fff; border: 3px solid #e2e8f0; color: #64748b; }
        .belt-white-yellow { background: linear-gradient(90deg, #fff 50%, #fde047 50%); border: 3px solid #e2e8f0; }
        .belt-yellow { background: #fde047; border: 3px solid #facc15; }
        .belt-yellow-orange { background: linear-gradient(90deg, #fde047 50%, #f97316 50%); border: 3px solid #facc15; }
        .belt-orange { background: #f97316; border: 3px solid #ea580c; color: #fff; }
        .belt-orange-green { background: linear-gradient(90deg, #f97316 50%, #22c55e 50%); border: 3px solid #ea580c; }
        .belt-green { background: #22c55e; border: 3px solid #16a34a; color: #fff; }

        .card-stat { background: white; border-radius: 2rem; border: 1px solid rgba(226, 232, 240, 0.8); transition: transform 0.2s; }
        .btn-primary { background: #2563eb; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        
        canvas { max-height: 220px !important; }
    </style>
</head>
<body class="antialiased pb-12">

    <div class="max-w-6xl mx-auto px-4 pt-6">
        
        <header class="flex flex-col md:flex-row items-center justify-between gap-6 mb-8 bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
            <div class="flex items-center gap-6">
                <div id="beltVisual" class="w-20 h-20 rounded-[1.5rem] shadow-inner flex items-center justify-center text-3xl transition-all duration-500">
                    <i class="fas fa-tshirt text-slate-200"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-800 tracking-tight text-slate-900">Даниил Тульский</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded uppercase tracking-widest">2015 г.р.</span>
                        <span id="beltName" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Белый пояс</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="flex-1 md:text-right bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Ваш текущий КЮ</p>
                    <select id="beltSelect" class="bg-transparent font-800 text-sm outline-none cursor-pointer text-blue-700 w-full">
                        <option value="belt-white">6 КЮ (Белый)</option>
                        <option value="belt-white-yellow">Бело-желтый</option>
                        <option value="belt-yellow">5 КЮ (Желтый)</option>
                        <option value="belt-yellow-orange">Желто-оранжевый</option>
                        <option value="belt-orange">4 КЮ (Оранжевый)</option>
                        <option value="belt-orange-green">Оранжево-зеленый</option>
                        <option value="belt-green">3 КЮ (Зеленый)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="w-12 h-12 rounded-2xl bg-white border border-slate-200 text-slate-400 flex items-center justify-center hover:text-blue-600 shadow-sm" title="Сохранить копию">
                        <i class="fas fa-download"></i>
                    </button>
                    <label class="w-12 h-12 rounded-2xl bg-white border border-slate-200 text-slate-400 flex items-center justify-center cursor-pointer hover:text-blue-600 shadow-sm" title="Загрузить из файла">
                        <i class="fas fa-upload"></i>
                        <input type="file" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
            <div class="card-stat p-6 flex flex-col items-center border-b-4 border-b-amber-400">
                <span class="text-4xl font-800 text-slate-900" id="s-gold">0</span>
                <span class="text-[10px] font-black uppercase text-slate-400 mt-1 tracking-widest">Золото</span>
            </div>
            <div class="card-stat p-6 flex flex-col items-center border-b-4 border-b-slate-300">
                <span class="text-4xl font-800 text-slate-900" id="s-silver">0</span>
                <span class="text-[10px] font-black uppercase text-slate-400 mt-1 tracking-widest">Серебро</span>
            </div>
            <div class="card-stat p-6 flex flex-col items-center border-b-4 border-b-orange-400">
                <span class="text-4xl font-800 text-slate-900" id="s-bronze">0</span>
                <span class="text-[10px] font-black uppercase text-slate-400 mt-1 tracking-widest">Бронза</span>
            </div>
            <div class="card-stat p-6 flex flex-col items-center border-b-4 border-b-blue-600">
                <span class="text-4xl font-800 text-slate-900" id="s-total">0</span>
                <span class="text-[10px] font-black uppercase text-slate-400 mt-1 tracking-widest">Турниров</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-8 tracking-widest italic">Активность по годам</h3>
                <div class="h-48">
                    <canvas id="yearlyChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest italic">Результативность</h3>
                <div class="relative w-44 h-44">
                    <canvas id="winChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="winRate" class="text-3xl font-800 leading-none">0%</span>
                        <span class="text-[8px] font-black text-slate-300 uppercase mt-1">Побед</span>
                    </div>
                </div>
                <div class="flex gap-8 mt-8">
                    <div class="text-center"><p id="s-wins" class="text-xl font-800 text-blue-600 leading-none">0</p><p class="text-[9px] font-bold uppercase text-slate-400 mt-1">Побед</p></div>
                    <div class="text-center"><p id="s-loss" class="text-xl font-800 text-red-400 leading-none">0</p><p class="text-[9px] font-bold uppercase text-slate-400 mt-1">Пораж.</p></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <h2 class="text-2xl font-800 text-slate-900">Протоколы соревнований</h2>
            <button onclick="openModal()" class="w-full sm:w-auto btn-primary text-white px-10 py-4 rounded-2xl font-800 text-sm shadow-xl shadow-blue-200">
                <i class="fas fa-plus mr-2"></i> ДОБАВИТЬ РЕЗУЛЬТАТ
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto text-left">
                <table class="w-full">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Турнир / Страна</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Дата</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Группа / Вес</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Место</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">П / П</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Опции</th>
                        </tr>
                    </thead>
                    <tbody id="tourBody" class="divide-y divide-slate-50 font-bold">
                        </tbody>
                </table>
                <div id="noData" class="p-24 text-center text-slate-300 hidden">
                    <i class="fas fa-award text-6xl mb-4 opacity-10"></i>
                    <p class="font-bold uppercase text-xs tracking-widest italic text-slate-400">Список пуст. Время выходить на татами!</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl border border-white">
            <h3 id="mTitle" class="text-2xl font-800 mb-8 text-slate-900 italic">Новый результат</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="sm:col-span-2">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Название турнира</label>
                    <input id="f-name" type="text" placeholder="Напр: Кубок Праги" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Дата</label>
                    <input id="f-date" type="date" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Страна</label>
                    <select id="f-country" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                        <option value="🇨🇿 Чехия">🇨🇿 Чехия</option>
                        <option value="🇩🇪 Германия">🇩🇪 Германия</option>
                        <option value="🇦🇹 Австрия">🇦🇹 Австрия</option>
                        <option value="🇵🇱 Польша">🇵🇱 Польша</option>
                        <option value="🇸🇰 Словакия">🇸🇰 Словакия</option>
                        <option value="🌍 Другая">🌍 Другая</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Возрастная группа</label>
                    <select id="f-age" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none">
                        <option value="U12">U12</option>
                        <option value="U14">U14</option>
                        <option value="U16">U16</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Вес (кг)</label>
                    <input id="f-weight" type="number" placeholder="Напр: 38" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Занятое место</label>
                    <select id="f-res" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none">
                        <option value="1">🥇 1 место (Золото)</option>
                        <option value="2">🥈 2 место (Серебро)</option>
                        <option value="3">🥉 3 место (Бронза)</option>
                        <option value="0">🥋 Участник</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Побед</label>
                        <input id="f-win" type="number" value="0" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-400 ml-3 mb-1 block">Пораж.</label>
                        <input id="f-loss" type="number" value="0" class="w-full bg-slate-50 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                    </div>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400 hover:text-slate-600 transition-colors">ОТМЕНА</button>
                <button onclick="save()" class="flex-[2] btn-primary text-white p-5 rounded-2xl font-black shadow-xl shadow-blue-100 uppercase tracking-tighter">СОХРАНИТЬ В БАЗУ</button>
            </div>
        </div>
    </div>

    <script>
        // --- СИСТЕМА ПЕРЕНОСА ДАННЫХ (МИГРАТОР) ---
        function migrate() {
            const keys = ['judo_pro_v5', 'judo_db_final', 'judo_master_db', 'judo_db_v4', 'judo_db_v3', 'judo_db_v2'];
            let master = JSON.parse(localStorage.getItem('judo_ultra_db')) || [];
            
            if (master.length === 0) {
                keys.forEach(k => {
                    const old = localStorage.getItem(k);
                    if (old) {
                        try {
                            const parsed = JSON.parse(old);
                            const arr = Array.isArray(parsed) ? parsed : (parsed.db || []);
                            master = [...master, ...arr];
                        } catch(e) {}
                    }
                });
                const unique = Array.from(new Map(master.map(i => [i.id, i])).values());
                localStorage.setItem('judo_ultra_db', JSON.stringify(unique));
                return unique;
            }
            return master;
        }

        let db = migrate();
        let belt = localStorage.getItem('judo_belt_ultra') || 'belt-white';
        let cLine, cPie, editId = null;

        function updateUI() {
            document.getElementById('noData').classList.toggle('hidden', db.length > 0);
            
            // Статистика медалей
            const g = db.filter(i => i.res == '1').length;
            const s = db.filter(i => i.res == '2').length;
            const b = db.filter(i => i.res == '3').length;
            const wins = db.reduce((acc, i) => acc + parseInt(i.win || 0), 0);
            const loss = db.reduce((acc, i) => acc + parseInt(i.loss || 0), 0);
            const intl = db.filter(i => i.country !== '🇨🇿 Чехия').length;

            document.getElementById('s-gold').innerText = g;
            document.getElementById('s-silver').innerText = s;
            document.getElementById('s-bronze').innerText = b;
            document.getElementById('s-total').innerText = db.length;
            document.getElementById('s-wins').innerText = wins;
            document.getElementById('s-loss').innerText = loss;
            
            const rate = (wins + loss) > 0 ? Math.round((wins / (wins + loss)) * 100) : 0;
            document.getElementById('winRate').innerText = rate + '%';

            // График по годам
            const yearsMap = {};
            db.forEach(i => { const y = i.date.split('-')[0]; yearsMap[y] = (yearsMap[y] || 0) + 1; });
            const yearsArr = Object.keys(yearsMap).sort();
            
            if(cLine) cLine.destroy();
            cLine = new Chart(document.getElementById('yearlyChart'), {
                type: 'bar',
                data: { labels: yearsArr.length ? yearsArr : ['2025'], datasets: [{ data: yearsArr.map(y => yearsMap[y]), backgroundColor: '#2563eb', borderRadius: 10, barThickness: 40 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
            });

            // Круговой график
            if(cPie) cPie.destroy();
            cPie = new Chart(document.getElementById('winChart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [wins, loss || 0.1], backgroundColor: ['#2563eb', '#f1f5f9'], borderWidth: 0, cutout: '85%' }] },
                options: { events: [], plugins: { tooltip: { enabled: false } } }
            });

            // Визуал пояса
            const visual = document.getElementById('beltVisual');
            visual.className = `w-20 h-20 rounded-[1.5rem] shadow-inner flex items-center justify-center text-3xl transition-all duration-500 ${belt}`;
            document.getElementById('beltName').innerText = document.querySelector(`#beltSelect option[value="${belt}"]`).text;

            // Таблица результатов
            document.getElementById('tourBody').innerHTML = db.sort((a,b) => new Date(b.date) - new Date(a.date)).map(t => `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="p-6">
                        <div class="text-slate-900 font-800">${t.name}</div>
                        <div class="text-[9px] font-black text-slate-400 uppercase mt-1 tracking-tight">${t.country}</div>
                    </td>
                    <td class="p-6 text-center">
                        <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded-lg">${t.date.split('-').reverse().join('.')}</span>
                    </td>
                    <td class="p-6 text-center">
                        <span class="text-xs font-bold text-slate-600">${t.age}</span>
                        <span class="text-[10px] text-slate-300 font-normal ml-1">/ ${t.weight}кг</span>
                    </td>
                    <td class="p-6 text-center text-2xl">
                        ${t.res == '1' ? '🥇' : t.res == '2' ? '🥈' : t.res == '3' ? '🥉' : '🥋'}
                    </td>
                    <td class="p-6 text-center">
                        <div class="inline-flex font-black text-xs">
                            <span class="text-blue-600">${t.win}</span><span class="mx-1 text-slate-200">/</span><span class="text-red-400">${t.loss}</span>
                        </div>
                    </td>
                    <td class="p-6 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editItem(${t.id})" class="text-blue-400 hover:text-blue-600 mr-4"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteItem(${t.id})" class="text-red-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function save() {
            const item = {
                id: editId || Date.now(),
                name: document.getElementById('f-name').value || 'Новый турнир',
                date: document.getElementById('f-date').value || '2025-01-01',
                country: document.getElementById('f-country').value,
                age: document.getElementById('f-age').value,
                weight: document.getElementById('f-weight').value || '0',
                res: document.getElementById('f-res').value,
                win: parseInt(document.getElementById('f-win').value) || 0,
                loss: parseInt(document.getElementById('f-loss').value) || 0
            };
            if(editId) {
                const idx = db.findIndex(i => i.id === editId);
                db[idx] = item;
            } else { db.push(item); }
            localStorage.setItem('judo_ultra_db', JSON.stringify(db));
            updateUI(); closeModal();
        }

        function editItem(id) {
            editId = id;
            const t = db.find(i => i.id === id);
            document.getElementById('f-name').value = t.name;
            document.getElementById('f-date').value = t.date;
            document.getElementById('f-country').value = t.country;
            document.getElementById('f-age').value = t.age;
            document.getElementById('f-weight').value = t.weight;
            document.getElementById('f-res').value = t.res;
            document.getElementById('f-win').value = t.win;
            document.getElementById('f-loss').value = t.loss;
            document.getElementById('mTitle').innerText = "Изменить результат";
            document.getElementById('modal').classList.remove('hidden');
        }

        function deleteItem(id) {
            if(confirm('Удалить эту запись безвозвратно?')) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('judo_ultra_db', JSON.stringify(db));
                updateUI();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({ db, belt })], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `дзюдо_даниил_бекап_${new Date().getFullYear()}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const imported = JSON.parse(ev.target.result);
                db = imported.db; belt = imported.belt;
                localStorage.setItem('judo_ultra_db', JSON.stringify(db));
                localStorage.setItem('judo_belt_ultra', belt);
                document.getElementById('beltSelect').value = belt;
                updateUI();
                alert('Данные успешно восстановлены!');
            };
            reader.readAsText(e.target.files[0]);
        }

        function openModal() { editId = null; document.getElementById('mTitle').innerText = "Новый результат"; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); ['f-name','f-date','f-weight','f-win','f-loss'].forEach(id => document.getElementById(id).value = ''); }
        
        document.getElementById('beltSelect').addEventListener('change', (e) => {
            belt = e.target.value; localStorage.setItem('judo_belt_ultra', belt); updateUI();
        });

        document.getElementById('beltSelect').value = belt;
        updateUI();
    </script>
</body>
</html>
